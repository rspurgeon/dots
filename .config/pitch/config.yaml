defaults:
  repo: kong/kongctl
  agent: codex
  environment: host
  worktree_root: ~/.local/share/worktrees

bootstrap_prompts:
  issue: >
    Use gh to read GitHub issue #{issue_number} in {repo}. Understand the
    task, constraints, and acceptance criteria. Do not make changes yet.
    Wait for the next instruction.
  pr: >
    Use gh to read GitHub PR #{pr_number} in {repo}. Understand the current
    changes, review comments, and checks. Inspect the checked-out branch
    locally. Run local tests. Do not make changes yet.
    Wait for the next instruction.

repos:
  kong/kongctl:
    sandbox: kongctl
    main_worktree: ~/dev/kong/kongctl
    additional_paths:
      - ~/go
    bootstrap_prompts:
      pr: >
        Use gh to read GitHub PR #{pr_number} in {repo}. Understand the current
        changes, review comments, and checks. Inspect the checked-out branch
        locally. Run local tests. DO NOT RUN e2e tests or read KONGCTL_E2E_*
        environment variables. Do not make changes yet.
        Wait for the next instruction.
  rspurgeon/pitch:
    sandbox: pitch
    main_worktree: ~/dev/rspurgeon/pitch

environments:
  host:
    kind: host

sandboxes:
  codex:
    provider: nono
    capability_elevation: true
  pitch:
    provider: nono
    profiles:
      codex: ~/dev/rspurgeon/dots/nono/profiles/pitch-codex.json
      claude: ~/dev/rspurgeon/dots/nono/profiles/pitch-claude.json
    capability_elevation: false
  kongctl:
    provider: nono
    profiles:
      codex: ~/dev/rspurgeon/dots/nono/profiles/kongctl-codex.json
      claude: ~/dev/rspurgeon/dots/nono/profiles/kongctl-claude.json
    capability_elevation: false

agents:
  codex:
    type: codex
    args:
      - --ask-for-approval
      - on-request
      - --model
      - gpt-5.4

  claude-enterprise:
    type: claude
    args:
      - --permission-mode
      - auto
    env:
      CLAUDE_CONFIG_DIR: ~/.claude
      CLAUDE_CODE_NO_FLICKER: "1"

  claude-personal:
    type: claude
    args:
      - --permission-mode
      - auto
    env:
      CLAUDE_CONFIG_DIR: ~/.claude-personal
      CLAUDE_CODE_NO_FLICKER: "1"

  opencode:
    type: opencode
    args:
      - attach
      - http://localhost:4096
      - --dir
    env:
      OPENCODE_SERVER_PASSWORD: ricky
